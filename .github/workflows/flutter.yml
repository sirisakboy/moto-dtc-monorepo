# Build and Test Flutter App
name: Flutter CI

on:
  push:
    branches:
      - main
    paths:
      - 'flutter_app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Flutter Pub Get
        working-directory: ./flutter_app
        run: flutter pub get

      - name: Analyze Code
        working-directory: ./flutter_app
        run: flutter analyze

      - name: Run Tests
        working-directory: ./flutter_app
        run: flutter test